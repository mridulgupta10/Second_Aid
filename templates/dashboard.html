<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="../static/images/logo.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second-Aid</title>
    <link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="../static/css/form-styles.css"> <!-- Add a new CSS file for form styling -->
    <script src="/static/js/main.js"></script>
   
</head>
<style>
    body{
        background-color: #BEE3F8;
    }
    .welcome-banner {
        max-width: 720px;
        margin: 0 auto 1.5rem;
        padding: 1.25rem 1.5rem;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid #cbd5e1;
        border-radius: 1rem;
        text-align: center;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
    }
    .welcome-banner h2 {
        margin: 0 0 0.5rem;
        color: #0f172a;
    }
    .welcome-banner p {
        margin: 0;
        color: #475569;
    }
</style>
<body>
    <div class="logo-container">
        <img src="/static/images/logo.png" alt="Second-Aid Logo">
    </div>
    {% if user_name %}
    <div class="welcome-banner">
        <h2>Welcome, {{ user_name }}!</h2>
        <p>You're ready to proceed to skin detection.</p>
    </div>
    {% endif %}
    <div class="form-container">
        <!-- Add a form for questions and consent -->
        <form class="question-form">
            <p class="question">1. What's your name?</p>
            <input type="text" name="name" required class="input-field">

            <p class="question">2. What's your gender?</p>
            <input type="radio" name="gender" value="Male" class="radio-input"> Male
            <input type="radio" name="gender" value="Female" class="radio-input"> Female
            <input type="radio" name="gender" value="Other" class="radio-input"> Other

            <p class="question">3. What's your age?</p>
            <input type="number" name="age" required class="input-field">

            <p class="question">4. For how many days the symptoms been present?</p>
            <input type="text" name="symptoms_duration" required class="input-field">

           
            <label class="consent-label">
                <input type="checkbox" name="consent" required class="checkbox-input"> I consent to data collection and analysis.
            </label>

            <div class="submit-container">
                <a href="/detect" class="submit-button">Submit</a>
            </div>
        </form>
    </div>

</body>

</html>
